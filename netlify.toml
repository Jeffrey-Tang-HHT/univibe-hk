[build]
  command = "npm install --legacy-peer-deps && npx vite build"
  publish = "dist/public"

[[edge_functions]]
  function = "send-code"
  path = "/api/send-code"

[[edge_functions]]
  function = "verify-code"
  path = "/api/verify-code"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
