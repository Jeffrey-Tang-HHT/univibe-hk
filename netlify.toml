[build]
  command = "corepack enable && pnpm install && npx vite build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  function = "send-code"
  path = "/api/send-code"

[[edge_functions]]
  function = "verify-code"
  path = "/api/verify-code"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
